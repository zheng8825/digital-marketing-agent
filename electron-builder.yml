appId: com.zheng8825.marketing-agent-dashboard
productName: Marketing Agent
copyright: Copyright © 2026

directories:
  buildResources: build
  output: release

files:
  - out/**
  - node_modules/**
  - package.json
  - "!**/*.map"

# The agent's brain (persona, knowledge, skills) ships with the app as an unpacked resource,
# then is copied to the per-user workspace on first run. Generated outputs and uploaded docs are NOT
# shipped (just the empty folders).
extraResources:
  - from: agent-workspace
    to: agent-workspace
    filter:
      - "**/*"
      - "!outputs/**"
      - "outputs/.gitkeep"
      - "!uploads/**"
      - "uploads/.gitkeep"

asar: true

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  # A real multi-resolution .ico (256/48/32/16) — generated from build/icon.png by `node build/make-icon.mjs`.
  # We ship the .ico so electron-builder embeds it directly (its PNG→ICO auto-conversion is unreliable).
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Marketing Agent
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

portable:
  artifactName: ${productName}-${version}-portable.${ext}
  # The portable .exe wrapper's icon — use the same multi-res .ico.
  # (electron-builder uses win.icon for this; setting it here too is harmless and explicit.)
